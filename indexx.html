<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #EFF5F9; font-family: sans-serif; }
        .main-container {
            background-color: #FFFFFF; max-width: 600px; margin: 50px auto; padding: 40px;
            border-radius: 15px; box-shadow: 0px 10px 20px rgba(19, 197, 221, 0.2);
            border-top: 8px solid #13C5DD;
        }
        h1 { color: #354F8E; }
        .lang-select {
            padding: 10px; font-size: 16px; border: 2px solid #13C5DD; 
            border-radius: 8px; outline: none; margin: 0 10px; color: #1D2A4D;
        }
        textarea {
            width: 90%; border: 2px solid #13C5DD; border-radius: 10px; padding: 15px;
            font-size: 16px; color: #1D2A4D; outline: none; margin-top: 20px;
        }
        .btn-custom {
            background-color: #13C5DD; color: white; border: none; padding: 12px 30px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-custom:hover { background-color: #354F8E; }
        #result-box {
            margin-top: 20px; font-size: 20px; color: #354F8E; font-weight: bold;
        }
@media (max-width: 600px) {
    /* Container ko mobile screen ke hisaab se set karne ke liye */
    .main-container {
        width: 95% !important;
        padding: 20px !important;
    }

    /* Elements ko ek ke niche ek lane ke liye */
    .main-container div {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
    }

    .lang-select {
        width: 100% !important;
        max-width: 280px !important;
        margin: 10px 0 !important;
    }

    .to-text {
        margin: 5px 0 !important;
        display: block !important;
    }

    textarea {
        width: 100% !important;
    }

    button {
        width: 100% !important;
        max-width: 280px !important;
    }
}
    </style>
</head>
<body>

    <div class="main-container" style="text-align: center;">
        <h1><i class="fas fa-language"></i> Shafat's Translator</h1>
        
        <!-- Yahan Kashmiri (ks) Add Kiya Hai -->
        <div style="margin-top: 20px;">
            <select id="sourceLang" class="lang-select">
                <option value="auto">Auto-Detect</option>
                <option value="ks">Kashmiri</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="ur">Urdu</option>
                <option value="ar">Arabic</option>
            </select>
            <span style="font-weight: bold; color: #354F8E;">TO</span>
            <select id="targetLang" class="lang-select">
                <option value="fa">persian</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="ur">Urdu</option>
                <option value="ar">Arabic</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ps">pashto</option>
                <option value="pt">portuguese</option>
                <option value="ru">russian</option>
                <option value="tr">turkish</option>
                <option value="ko">korean</option>
                <option value="la">latin</option>
                <option value="ar">Arabic</option>
                <option value="fr">French</option>
                <option value="ta">tamil</option>
                <option value="uk">ukrainian</option>
                <option value="ne">nepali</option>
                <option value="kn">kannada</option>
                <option value="ml">malayalam</option>
                <option value="ks">Kashmiri</option>
                <option value="pa">punjabi</option>
            </select>
        </div>
        
        <textarea id="myInput" rows="5" placeholder="Type your text here..."></textarea>
        
        <br><br>
        <button class="btn-custom"><i class="fas fa-magic"></i> Translate Now</button>

        <div id="result-box"></div>
    </div>

    <script>
        function doTranslation() {
            let typedText = document.getElementById("myInput").value;
            let sLang = document.getElementById("sourceLang").value;
            let tLang = document.getElementById("targetLang").value;
            
            document.getElementById("result-box").innerText = "Translating...";
            
            fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: typedText, source: sLang, target: tLang })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("result-box").innerText = data.translated_text;
            })
            .catch(error => {
                document.getElementById("result-box").innerText = "Translation failed!";
            });
        }
    </script>
</body>
</html>
