<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Project</title>
    <style>
        body { background-color: #EFF5F9; font-family: sans-serif; }
        .main-container {
            background-color: #FFFFFF; max-width: 600px; margin: 50px auto; padding: 40px;
            border-radius: 15px; box-shadow: 0px 10px 20px rgba(19, 197, 221, 0.2);
            border-top: 8px solid #13C5DD;
        }
        h1 { color: #354F8E; }
        .lang-select {
            padding: 10px; font-size: 16px; border: 2px solid #13C5DD; 
            border-radius: 8px; outline: none; margin: 0 10px; color: #1D2A4D;
        }
        textarea {
            width: 90%; border: 2px solid #13C5DD; border-radius: 10px; padding: 15px;
            font-size: 16px; color: #1D2A4D; outline: none; margin-top: 20px;
        }
        .btn-custom {
            background-color: #13C5DD; color: white; border: none; padding: 12px 30px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-custom:hover { background-color: #354F8E; }
        #result-box {
            margin-top: 20px; font-size: 20px; color: #354F8E; font-weight: bold;
        }
        /* Mobile ke liye special settings */
        @media (max-width: 600px) {
            .main-container {
                width: 90% !important;
                padding: 20px !important;
            }
            h1 {
                font-size: 24px !important;
            }
            select {
                width: 100% !important;
                margin: 10px 0 !important;
            }
            .to-text {
                display: block !important;
                margin: 5px 0 !important;
                font-weight: bold;
            }
            textarea {
                width: 100% !important;
            }
            button {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>

    <div class="main-container" style="text-align: center;">
        <h1>✨ Shafat's Translator ✨</h1>
        
        <div style="margin-top: 20px;">
            <select id="sourceLang" class="lang-select">
                <option value="auto">Auto-Detect</option> <!-- Ye wapas aa gaya! -->
                <option value="en">English</option>
                <option value="ks">Kashmiri</option>
                <option value="hi">Hindi</option>
                <option value="ur">Urdu</option>
                <option value="ar">Arabic</option>
            </select>
            <span class="to-text" style="font-weight: bold; color: #354F8E;">TO</span>
            <select id="targetLang" class="lang-select">
                <option value="ur">Urdu</option>
                <option value="fa">Persian</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="ar">Arabic</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ps">Pashto</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="tr">Turkish</option>
                <option value="ko">Korean</option>
                <option value="la">Latin</option>
                <option value="ta">Tamil</option>
                <option value="uk">Ukrainian</option>
                <option value="ne">Nepali</option>
                <option value="kn">Kannada</option>
                <option value="ml">Malayalam</option>
                <option value="ks">Kashmiri</option>
                <option value="pa">Punjabi</option>
            </select>
        </div>
        
        <textarea id="myInput" rows="5" placeholder="Type your text here..."></textarea>
        
        <br><br>
        <button class="btn-custom" onclick="doTranslation()">Translate Now</button>

        <div id="result-box"></div>
    </div>

    <script>
        function doTranslation() {
            let typedText = document.getElementById("myInput").value;
            let sLang = document.getElementById("sourceLang").value;
            let tLang = document.getElementById("targetLang").value;
            
            if (!typedText.trim()) {
                document.getElementById("result-box").innerText = "Please type some text first!";
                return;
            }

            document.getElementById("result-box").innerText = "Translating... Please wait ⏳";
            
            // Google Translate API ka free version (Auto-detect ke sath badiya chalta hai)
            let apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sLang}&tl=${tLang}&dt=t&q=${encodeURIComponent(typedText)}`;

            fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                let translatedText = "";
                // Google ka data thoda andar hota hai, usko nikalne ke liye:
                if (data && data[0]) {
                    data[0].forEach(item => {
                        if (item[0]) translatedText += item[0];
                    });
                    document.getElementById("result-box").innerText = translatedText;
                } else {
                    document.getElementById("result-box").innerText = "Translation failed! Try again.";
                }
            })
            .catch(error => {
                document.getElementById("result-box").innerText = "Network Error! Check your internet.";
                console.error("Error details:", error);
            });
        }
    </script>
</body>
</html>
